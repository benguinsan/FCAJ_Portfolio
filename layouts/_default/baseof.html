<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="min-h-screen bg-white text-gray-900 dark:bg-gray-950 dark:text-gray-100">
  <div class="flex min-h-screen flex-col md:flex-row">
    <aside
      class="w-full shrink-0 border-b border-gray-200 bg-gray-50 p-4 dark:border-gray-700 dark:bg-gray-900 md:w-72 md:border-b-0 md:border-r md:sticky md:top-0 md:h-screen md:overflow-y-auto"
      aria-label="Sidebar"
    >
      {{ partial "sidebar.html" . }}
    </aside>
    <div class="flex min-h-screen min-w-0 flex-1 flex-col">
      <main class="flex-1 bg-white px-4 py-6 md:px-8 md:py-8 text-gray-900 dark:bg-white dark:text-gray-900">
        {{ block "main" . }}{{ end }}
      </main>
    </div>
  </div>
</body>
</html>
