# `hugo server` overrides baseURL for local dev. GitHub Actions uses Pages’ real URL via --baseURL.
# If you build with `hugo` locally for preview, set this to your site (user page: https://USER.github.io/).
baseURL = 'https://benguinsan.github.io/FCAJ_Portfolio/'
languageCode = 'en-us'
defaultContentLanguage = 'en'
title = 'FCAJ Report'

theme = ['flowbite-theme']

[params]
  ordersectionsby = 'weight'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.en]
    languageName = 'English'
    weight = 1
    title = 'Internship Report'
  [languages.vi]
    languageName = 'Tiếng Việt'
    weight = 2
    title = 'Báo cáo thực tập'

[[languages.en.menu.shortcuts]]
name = "<i class='fab fa-facebook'></i> AWS Study Group"
identifier = 'aws-study-fb'
url = 'https://www.facebook.com/groups/awsstudygroupfcj/'
weight = 20

[[languages.vi.menu.shortcuts]]
name = "<i class='fab fa-facebook'></i> AWS Study Group"
identifier = 'aws-study-fb'
url = 'https://www.facebook.com/groups/awsstudygroupfcj/'
weight = 20
